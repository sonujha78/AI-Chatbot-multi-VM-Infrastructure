server {
    listen 80;
    server_name localhost 192.168.122.11;

    location /api/ {
        proxy_pass http://192.168.122.13:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://192.168.122.12:3000;
        proxy_set_header Host $host;
    }
}
